<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="icon" type="image/png" href="img/duck.png" sizes="32x32">
</head>

<body>
    <!-- new page for new book with navbar and text -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <img src="./img/duck.png" alt="logo-duck" width="50" height="50" class="d-inline-block align-text-top">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active text-white" aria-current="page" href="#">Catalogo Libri</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-secondary" href="#">Anagrafica Utenti</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-secondary" href="#">Storico Prestiti</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-secondary" href="#">Help</a>
                    </li>
                </ul>
                <form class="d-flex" role="Cerca">
                    <input class="form-control me-2" type="Cerca" placeholder="Cerca" aria-label="Cerca" />
                    <button class="btn btn-outline-white text-white border-white" type="submit">Cerca</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1 class="my-4">Nuovo Libro</h1>
        <div class="row my-2">
            <div class="col-6">
                <form>
                    <label class="my-2" for="title-filter">Nome Autore</label>
                    <input type="text" class="form-control w-20" name="filter" id="title-filter"
                        placeholder="Inserisci il nome dell'autore">
                </form>
            </div>
            <div class="col-6">
                <form>
                    <label class="my-2" for="title-filter">Cognome Autore</label>
                    <input type="text" class="form-control w-20" name="filter" id="title-filter"
                        placeholder="Inserisci il cognome dell'autore">
                </form>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <form>
                    <label class="my-2" for="title-filter">Titolo</label>
                    <input type="text" class="form-control w-20" name="filter" id="title-filter"
                        placeholder="Inserisci il titolo del libro">
                    <div class="form-text" id="basic-addon4">Titolo versione italiana</div>
                </form>
            </div>
        </div>

        <div class="row mb-5">
            <div class="col-4">
                <form>
                    <label class="my-2" for="title-filter">Genere</label>
                    <select class="form-select" aria-label="Default select example">
                        <option selected>Scegli il genere</option>
                        <option value="1">Avventura</option>
                        <option value="2">Giallo</option>
                        <option value="3">Fantasy</option>
                    </select>
                </form>
            </div>
            <div class="col-4">
                <form>
                    <label class="my-2" for="title-filter">Anno di pubblicazione</label>
                    <input type="text" class="form-control w-20" name="filter" id="title-filter"
                        placeholder="Inserisci l'anno">
                </form>
            </div>
            <div class="col-4">
                <form>
                    <label class="my-2" for="title-filter">ISBN#</label>
                    <input type="text" class="form-control w-20" name="filter" id="title-filter"
                        placeholder="Inserisci il codice ISBN#">
                </form>
            </div>
        </div>
        <hr>
        <div class="row">
            <div class="col-12">
                <form>
                    <div class="mb-3">
                        <label for="exampleFormControlTextarea1" class="form-label">Note</label>
                        <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"
                            placeholder="Inserisci eventuali note sul libro"></textarea>
                    </div>
                </form>
            </div>
        </div>






    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
